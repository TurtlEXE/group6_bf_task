<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('Forgot Password')}"></head>
<body style="background: url('https://images.unsplash.com/photo-1503614472-8c93d56e92ce?q=80&w=1622&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center/cover; background-attachment: fixed;">

  <div class="container-fluid auth-wrapper" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 15px; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
    <div class="row g-0 auth-card" style="border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); overflow: hidden; background: #ffffff; max-width: 550px; width: 100%;">

      <!-- Form -->
      <div class="col-12">
        <div class="auth-form-container" style="padding: 4rem; display: flex; flex-direction: column; justify-content: center; background-color: #ffffff;">
          <div class="mb-4 text-center">
            <a th:href="@{/login}" class="text-muted text-decoration-none small d-inline-flex align-items-center mb-3 fw-medium"><i class="bi bi-arrow-left me-2"></i> Back to Sign In</a><br>
            <a th:href="@{/}" class="d-inline-flex align-items-center gap-2 text-decoration-none text-dark mb-4">
              <img th:src="@{/assets/images/logo.png}" alt="Wanderlust Logo" height="40">
              <span class="fw-bold fs-4 text-primary">Wanderlust</span>
            </a>
            <div class="mb-3" style="display: flex; justify-content: center;">
              <div style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #e0ebff 0%, #c7d2fe 100%); display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-envelope-paper fs-2 text-primary"></i>
              </div>
            </div>
            <h3 class="fw-bold mb-2">Forgot Your Password?</h3>
            <p class="text-muted fs-6">No worries! Enter your email address below and we'll send you a link to reset your password.</p>
          </div>

          <!-- Success Message -->
          <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center rounded-3 mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
          </div>

          <!-- Error Message -->
          <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center rounded-3 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
          </div>

          <form th:action="@{/forgot-password}" method="post">
            <div class="mb-4">
              <label class="form-label fw-semibold text-dark mb-2">Email Address <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border" style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" name="email" class="form-control form-control-lg border-start-0 ps-0" placeholder="Enter your registered email" required style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-auth mb-4 w-100 py-3 rounded-3 fw-bold fs-5 shadow-sm">Send Reset Link</button>
            
            <p class="text-center text-muted mb-0 mt-3">
              Remember your password? <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Sign In</a>
            </p>
          </form>
        </div>
      </div>

    </div>
  </div>

  <div th:replace="~{fragments/navbar :: scripts}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form[action*="/forgot-password"]');
        if (form) {
            form.addEventListener('submit', function(e) {
                if (this.checkValidity()) {
                    const btn = this.querySelector('button[type="submit"]');
                    if (btn) {
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Sending...';
                        btn.disabled = true;
                        // Prevent multiple submissions
                        if (form.getAttribute('data-submitting') === 'true') {
                            e.preventDefault();
                        } else {
                            form.setAttribute('data-submitting', 'true');
                        }
                    }
                }
            });
        }
    });
  </script>
</body>
</html>
