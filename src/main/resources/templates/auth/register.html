<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/navbar :: head('Register')}"></head>

<body
  style="background: url('https://images.unsplash.com/photo-1503614472-8c93d56e92ce?q=80&w=1622&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center/cover; background-attachment: fixed;">

  <div class="container-fluid auth-wrapper"
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 3rem 15px; background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
    <div class="row g-0 auth-card flex-row-reverse"
      style="border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); overflow: hidden; background: #ffffff; max-width: 1100px; width: 100%;">

      <!-- Image Side -->
      <div class="col-lg-5">
        <div class="auth-image"
          style="background: url('https://images.unsplash.com/photo-1597086831879-756db15e81d3?q=80&w=1548&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center/cover; min-height: 300px; height: 100%; position: relative;">
          <div class="auth-image-overlay"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(79, 70, 229, 0.1), rgba(17, 24, 39, 0.85)); display: flex; flex-direction: column; justify-content: flex-end; padding: 4rem; color: white;">
            <h2 class="fw-bold mb-3 display-6">Join Wanderlust</h2>
            <p class="mb-0 fs-5 text-white-50">Create an account to book tours, save your favorite destinations, and
              join our global travel community.</p>
          </div>
        </div>
      </div>

      <!-- Form Side -->
      <div class="col-lg-7">
        <div class="auth-form-container"
          style="padding: 4rem; display: flex; flex-direction: column; justify-content: center; height: 100%; background-color: #ffffff;">
          <div class="mb-4 text-center text-lg-start">
            <a th:href="@{/}"
              class="text-muted text-decoration-none small d-inline-flex align-items-center mb-3 fw-medium"><i
                class="bi bi-arrow-left me-2"></i> Back to Home</a><br>
            <a th:href="@{/}" class="d-inline-flex align-items-center gap-2 text-decoration-none text-dark mb-4">
              <img th:src="@{/assets/images/logo.png}" alt="Wanderlust Logo" height="40">
              <span class="fw-bold fs-4 text-primary">Wanderlust</span>
            </a>
            <h3 class="fw-bold mb-2">Create an Account</h3>
            <p class="text-muted fs-6">Start your journey with us today.</p>
          </div>

          <form th:action="@{/register}" method="post" th:object="${registerDTO}">

            <div class="mb-3">
              <label class="form-label fw-semibold text-dark mb-2">Username <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border"
                  style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                  <i class="bi bi-person-badge text-muted"></i>
                </span>
                <input type="text" th:field="*{username}"
                  th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                  class="form-control form-control-lg border-start-0 ps-0" placeholder="e.g. wanderer99" required
                  style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
              </div>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label fw-semibold text-dark mb-2">First Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 border"
                    style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input type="text" th:field="*{firstName}" class="form-control form-control-lg border-start-0 ps-0"
                    placeholder="e.g. Alex"
                    style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
                </div>
              </div>
              <div class="col-sm-6">
                <label class="form-label fw-semibold text-dark mb-2">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control form-control-lg" placeholder="e.g. Smith"
                  style="border-radius: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0; font-size: 1rem; padding: 0.8rem 1.2rem;">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold text-dark mb-2">Email Address <span
                  class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border"
                  style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" th:field="*{email}"
                  th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                  class="form-control form-control-lg border-start-0 ps-0" placeholder="e.g. alex.smith@example.com"
                  required style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
              </div>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-sm-6">
                <label class="form-label fw-semibold text-dark mb-2">Password <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 border"
                    style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" th:field="*{password}"
                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                    class="form-control form-control-lg border-start-0 ps-0" placeholder="Enter your password" required
                    style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                </div>
              </div>
              <div class="col-sm-6">
                <label class="form-label fw-semibold text-dark mb-2">Confirm Password <span
                    class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 border"
                    style="border-radius: 12px 0 0 12px; border-color: #e2e8f0;">
                    <i class="bi bi-check-circle text-muted"></i>
                  </span>
                  <input type="password" th:field="*{confirmPassword}"
                    th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                    class="form-control form-control-lg border-start-0 ps-0" placeholder="Re-enter your password"
                    required style="border-radius: 0 12px 12px 0; background-color: #f8fafc; font-size: 1rem;">
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}"
                  th:errors="*{confirmPassword}"></div>
              </div>
            </div>

            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label text-muted" for="terms">I agree to the <a href="#"
                  class="text-primary text-decoration-none fw-medium">Terms of Service</a> and <a href="#"
                  class="text-primary text-decoration-none fw-medium">Privacy Policy</a>. <span
                  class="text-danger">*</span></label>
            </div>

            <button type="submit"
              class="btn btn-primary btn-auth mb-4 w-100 py-3 rounded-3 fw-bold fs-5 shadow-sm">Create Account</button>

            <p class="text-center text-muted mb-0 mt-3">
              Already have an account? <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Sign
                In</a>
            </p>
          </form>
        </div>
      </div>

    </div>
  </div>

  <div th:replace="~{fragments/navbar :: scripts}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.querySelector('form[action*="/register"]');
      if (form) {
        form.addEventListener('submit', function (e) {
          if (this.checkValidity()) {
            const btn = this.querySelector('button[type="submit"]');
            if (btn) {
              btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Please wait...';
              btn.disabled = true;
              // Prevent multiple submissions
              if (form.getAttribute('data-submitting') === 'true') {
                e.preventDefault();
              } else {
                form.setAttribute('data-submitting', 'true');
              }
            }
          }
        });
      }
    });
  </script>
</body>

</html>
