<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Admin Sidebar Fragment -->
<nav th:fragment="sidebar(activePage)" class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-header">
    <a th:href="@{/admin/dashboard}" class="sidebar-brand">
      <img th:src="@{/assets/images/logo.png}" alt="Logo" height="32">
      <span>Wanderlust</span>
    </a>
  </div>

  <ul class="sidebar-nav">
    <li class="sidebar-nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
      <a th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    </li>
    <li class="sidebar-nav-item" th:classappend="${activePage == 'tours'} ? 'active'">
      <a th:href="@{/admin/tours}"><i class="bi bi-map-fill"></i> Tours</a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <a th:href="@{/}" class="sidebar-footer-link"><i class="bi bi-globe me-2"></i> View Site</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
      <button type="submit" class="sidebar-footer-link btn-link"><i class="bi bi-box-arrow-right me-2"></i>
        Logout</button>
    </form>
  </div>
</nav>

</html>
