<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Admin Sidebar Fragment -->
<nav th:fragment="sidebar(activePage)" class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-header border-bottom border-light border-opacity-10">
    <a th:href="@{/admin/dashboard}" class="sidebar-brand">
      <div class="bg-primary bg-gradient rounded d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
        <i class="bi bi-compass text-white"></i>
      </div>
      <div class="d-flex flex-column lh-1">
        <span class="fs-5 fw-bold text-white tracking-wide">Wanderlust</span>
        <span class="text-uppercase text-white-50" style="font-size: 0.6rem; letter-spacing: 1px; margin-top: 2px;">Tour Management</span>
      </div>
    </a>
  </div>

  <ul class="sidebar-nav px-3 py-4">
    <li class="sidebar-nav-item mb-1" th:classappend="${activePage == 'dashboard'} ? 'active'">
      <a th:href="@{/admin/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
    </li>
    <li class="sidebar-nav-item mb-1" th:classappend="${activePage == 'tours'} ? 'active'">
      <a th:href="@{/admin/tours}"><i class="bi bi-compass"></i> Tours</a>
    </li>
    <li class="sidebar-nav-item mb-1" th:classappend="${activePage == 'bookings'} ? 'active'">
      <a href="#"><i class="bi bi-ticket-perforated"></i> Bookings</a>
    </li>
    <li class="sidebar-nav-item mb-1" th:classappend="${activePage == 'settings'} ? 'active'">
      <a href="#"><i class="bi bi-gear"></i> Settings</a>
    </li>
  </ul>

  <div class="sidebar-footer mt-auto border-top border-light border-opacity-10 d-flex flex-column gap-3 p-4">
    <a th:href="@{/}" target="_blank" class="sidebar-footer-link d-flex align-items-center text-white-50 text-decoration-none">
      <i class="bi bi-globe me-3 fs-5"></i> <span class="fw-medium">View Site</span>
    </a>
    <form th:action="@{/logout}" method="post" class="d-inline m-0">
      <button type="submit" class="sidebar-footer-link btn btn-link p-0 text-danger text-decoration-none d-flex align-items-center">
        <i class="bi bi-box-arrow-right me-3 fs-5"></i> <span class="fw-medium">Logout</span>
      </button>
    </form>
  </div>
</nav>

</html>
