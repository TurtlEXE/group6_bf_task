<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
  <!-- Common Head Elements -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | Wanderlust Travels'">Title</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <!-- Navigation -->
  <nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-light sticky-top bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
        <img th:src="@{/assets/images/logo.png}" alt="Wanderlust Logo" height="40">
        <span class="fw-bold text-primary">Wanderlust</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'"
              th:href="@{/}">Home</a></li>
          <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'destinations'} ? 'active'"
              th:href="@{/destinations}">Destinations</a></li>
          <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'tours'} ? 'active'"
              th:href="@{/tours}">Tours</a></li>
          <li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'contact'} ? 'active'"
              th:href="@{/contact}">Contact</a></li>
        </ul>

        <ul class="navbar-nav ms-auto align-items-center">
          <!-- Removed Language Switcher -->

          <!-- Guest Links -->
          <li class="nav-item mt-3 mt-lg-0" sec:authorize="!isAuthenticated()">
            <a class="btn btn-outline-primary rounded-pill fw-medium text-center btn-sm px-4" th:href="@{/login}">Log
              In</a>
          </li>
          <li class="nav-item ms-lg-2 mt-2 mt-lg-0" sec:authorize="!isAuthenticated()">
            <a class="btn btn-primary rounded-pill fw-medium text-center btn-sm px-4" th:href="@{/register}">Sign Up</a>
          </li>

          <!-- Authenticated User Links -->
          <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
            <a class="nav-link dropdown-toggle fw-medium d-flex align-items-center gap-2" href="#" id="userDropdown"
              role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-person-circle fs-5 text-primary"></i>
              <span th:text="${#authentication.principal instanceof T(com.wanderlust.bf_groupproject_1.security.CustomUserDetails) ? #authentication.principal.fullName : #authentication.name}">User</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown">
              <li sec:authorize="hasRole('ADMIN')">
                <a class="dropdown-item py-2" th:href="@{/admin/tours}"><i
                    class="bi bi-speedometer2 me-2 text-muted"></i> Admin Dashboard</a>
              </li>
              <li sec:authorize="hasRole('ADMIN')">
                <hr class="dropdown-divider">
              </li>
              <li>
                <form th:action="@{/logout}" method="post">
                  <button type="submit" class="dropdown-item py-2 text-danger"><i
                      class="bi bi-box-arrow-right me-2"></i> Logout</button>
                </form>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Common Scripts -->
  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/i18n.js}"></script>
  </div>

</body>

</html>
