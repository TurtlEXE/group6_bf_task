<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/navbar :: head('Manage Tours')}"></head>

<body class="admin-body">

  <div th:replace="~{fragments/admin-sidebar :: sidebar('tours')}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h4 class="mb-0 fw-bold">Manage Tours</h4>
        <small class="text-muted">Create, edit, and manage tour packages</small>
      </div>
      <a th:href="@{/admin/tours/new}" class="btn btn-primary rounded-pill px-4"><i class="bi bi-plus-lg me-2"></i>New
        Tour</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th class="ps-4">Tour</th>
              <th>Location</th>
              <th>Category</th>
              <th>Price</th>
              <th>Duration</th>
              <th class="text-center">Status</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="tour : ${tours.content}">
              <td class="ps-4">
                <div class="d-flex align-items-center gap-3">
                  <img th:src="${tour.imageUrl}" class="rounded-3" style="width: 60px; height: 45px; object-fit: cover;"
                    th:alt="${tour.title}">
                  <div>
                    <h6 class="mb-0 fw-semibold" th:text="${tour.title}">Title</h6>
                    <small class="text-muted" th:if="${tour.featured}"><i class="bi bi-star-fill text-warning"></i>
                      Featured</small>
                  </div>
                </div>
              </td>
              <td>
                <span class="text-muted" th:text="${tour.location}">Location</span>
              </td>
              <td>
                <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3"
                  th:text="${tour.category}">CAT</span>
              </td>
              <td>
                <span class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(tour.price, 1, 2)}">$0</span>
              </td>
              <td>
                <span th:text="${tour.durationDays} + ' days'">0 days</span>
              </td>
              <td class="text-center">
                <span th:if="${tour.active}"
                  class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Active</span>
                <span th:unless="${tour.active}"
                  class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill px-3">Inactive</span>
              </td>
              <td class="text-end pe-4">
                <a th:href="@{/admin/tours/{id}/edit(id=${tour.id})}"
                  class="btn btn-sm btn-outline-primary rounded-pill px-3 me-1"><i class="bi bi-pencil"></i></a>
                <form th:action="@{/admin/tours/{id}/delete(id=${tour.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Are you sure you want to delete this tour?');">
                  <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i
                      class="bi bi-trash"></i></button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center p-3"
        th:if="${tours.totalPages > 1}">
        <small class="text-muted" th:text="'Page ' + (${tours.number} + 1) + ' of ' + ${tours.totalPages}"></small>
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${tours.first} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/tours(page=${tours.number - 1})}">Prev</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, tours.totalPages - 1)}"
              th:classappend="${tours.number == i} ? 'active'">
              <a class="page-link" th:href="@{/admin/tours(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${tours.last} ? 'disabled'">
              <a class="page-link" th:href="@{/admin/tours(page=${tours.number + 1})}">Next</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/navbar :: scripts}"></div>
</body>

</html>
